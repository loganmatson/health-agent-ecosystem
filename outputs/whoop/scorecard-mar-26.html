<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whoop Monthly Scorecard — Mar 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-raised: #1a1a26;
      --surface-hover: #222233;
      --border: #2a2a3a;
      --border-bright: #3a3a50;
      --ink: #e8e6f0;
      --ink-dim: #8888a0;
      --ink-faint: #55556a;
      --whoop-green: #44d98c;
      --whoop-green-dim: rgba(68,217,140,0.12);
      --whoop-green-glow: rgba(68,217,140,0.25);
      --whoop-red: #ff5c5c;
      --whoop-red-dim: rgba(255,92,92,0.12);
      --whoop-amber: #ffb84d;
      --whoop-amber-dim: rgba(255,184,77,0.12);
      --whoop-blue: #5c9eff;
      --whoop-blue-dim: rgba(92,158,255,0.12);
      --gradient-start: #44d98c;
      --gradient-end: #5c9eff;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f0f0f5;
        --surface: #ffffff;
        --surface-raised: #f8f8fc;
        --surface-hover: #ededf5;
        --border: #d8d8e5;
        --border-bright: #c0c0d0;
        --ink: #1a1a2e;
        --ink-dim: #6a6a80;
        --ink-faint: #9a9ab0;
        --whoop-green: #1a9e5a;
        --whoop-green-dim: rgba(26,158,90,0.08);
        --whoop-green-glow: rgba(26,158,90,0.15);
        --whoop-red: #d93636;
        --whoop-red-dim: rgba(217,54,54,0.08);
        --whoop-amber: #b88a1a;
        --whoop-amber-dim: rgba(184,138,26,0.08);
        --whoop-blue: #2a6ed9;
        --whoop-blue-dim: rgba(42,110,217,0.08);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HERO BANNER ── */
    .hero {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
    }
    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 32px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
    }
    .hero-left {}
    .hero-eyebrow {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--whoop-green);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pulse-dot {
      width: 6px; height: 6px;
      background: var(--whoop-green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--whoop-green-glow); }
      50% { opacity: 0.7; box-shadow: 0 0 0 8px transparent; }
    }
    .hero-month {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .hero-range {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--ink-dim);
      letter-spacing: 0.3px;
    }

    /* ── SAMPLE PILLS ── */
    .hero-pills {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .pill {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .pill:hover { border-color: var(--border-bright); }
    .pill-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      color: var(--ink);
      display: block;
      line-height: 1;
    }
    .pill-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: 4px;
    }

    /* ── MAIN ── */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 28px 32px 48px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 14px;
      padding-left: 2px;
    }

    /* ── METRIC CARDS ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }
    .metrics-row-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 18px 18px;
      position: relative;
      transition: all 0.2s ease;
      overflow: hidden;
    }
    .metric-card:hover {
      border-color: var(--border-bright);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .metric-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .metric-card:hover::after { opacity: 1; }
    .metric-card:nth-child(1)::after { background: var(--whoop-green); }
    .metric-card:nth-child(2)::after { background: var(--whoop-blue); }
    .metric-card:nth-child(3)::after { background: var(--whoop-amber); }

    .metric-label {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 10px;
    }
    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -1px;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 8px;
    }
    .metric-subvalue {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--whoop-green);
      margin-bottom: 6px;
    }

    .trend {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 6px;
    }
    .trend--neutral {
      color: var(--ink-faint);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 3px 0;
    }
    .trend--up { color: var(--whoop-green); background: var(--whoop-green-dim); }
    .trend--down { color: var(--whoop-red); background: var(--whoop-red-dim); }

    /* ── INTERVENTION CARD (special) ── */
    .metric-card.intervention {
      border-color: var(--border);
    }
    .metric-card.intervention::after {
      background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
    }
    .metric-card.intervention:hover::after { opacity: 1; }
    .intervention-badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--whoop-green-dim);
      color: var(--whoop-green);
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    /* ── VERDICT ── */
    .verdict {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }
    .verdict::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--gradient-start), var(--gradient-end));
    }
    .verdict-label {
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--whoop-green);
      margin-bottom: 10px;
    }
    .verdict-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--ink-dim);
      font-weight: 400;
    }
    .verdict-text strong {
      color: var(--ink);
      font-weight: 600;
    }

    /* ── MINI CHART BARS ── */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .bar-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--ink-faint);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface-raised);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      animation: barGrow 0.8s ease-out forwards;
      transform-origin: left;
    }
    @keyframes barGrow {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    .bar-fill.green { background: var(--whoop-green); }
    .bar-fill.blue { background: var(--whoop-blue); }
    .bar-fill.amber { background: var(--whoop-amber); }

    /* ── FOOTER ── */
    footer {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px 32px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--ink-faint);
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
    }

    @media (max-width: 520px) {
      .hero-inner { flex-direction: column; align-items: flex-start; }
      .hero-pills { align-self: stretch; }
      .pill { flex: 1; }
      .metrics-grid { grid-template-columns: 1fr; }
      .metrics-row-2 { grid-template-columns: 1fr; }
      .hero-month { font-size: 32px; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-left">
        <div class="hero-eyebrow"><span class="pulse-dot"></span> Whoop Monthly Scorecard</div>
        <div class="hero-month" id="hero-month"></div>
        <div class="hero-range" id="hero-range"></div>
      </div>
      <div class="hero-pills" id="hero-pills"></div>
    </div>
  </div>

  <div class="main">
    <div class="section-label">Key Metrics</div>
    <div class="metrics-grid" id="metrics-top"></div>
    <div class="metrics-row-2" id="metrics-bot"></div>

    <div class="verdict" id="verdict"></div>

    <footer>
      <span>Built by Bob the Builder</span>
      <span id="footer-date"></span>
    </footer>
  </div>

  <script>
    // ============================================================
    // DATA — Updated from analysis-results.json
    // ============================================================
    const SCORECARD = {
      month: "March 2026",
      dateRange: "Dec 25, 2025 — Mar 25, 2026",
      totalDays: 92,
      totalWorkouts: 207,
      anomalyRows: 2,
      metrics: [
        {
          label: "Avg Recovery", value: "57.6%", trend: "up", delta: "+6.0%",
          barPercent: 57.6, barColor: "green"
        },
        {
          label: "Avg HRV", value: "132 ms", trend: "up", delta: "+3.5 ms",
          barPercent: 66.0, barColor: "blue"
        },
        {
          label: "Avg Sleep", value: "7h 23m", trend: "up", delta: "+3 min",
          barPercent: 92.3, barColor: "amber"
        },
        {
          label: "Avg Strain", value: "12.9", trend: "down", delta: "-0.5",
          barPercent: 61.4, barColor: "green"
        },
        {
          label: "Top Intervention", value: "Electrolytes",
          subvalue: "d = 0.64 \u00b7 +10 pts recovery",
          trend: null, delta: null,
          badge: "Highest ROI"
        }
      ],
      verdict: "<strong>Recovery jumped +6 points</strong> month-over-month to 57.6%, with HRV up to 132ms. <strong>Alcohol</strong> is the single biggest recovery destroyer (d = \u22120.81). <strong>Electrolyte supplementation</strong> is the highest-ROI positive intervention (d = 0.64). <strong>HRV independently predicts recovery</strong> even after controlling for sleep (partial r = 0.80). Marathon readiness is on track \u2014 protect sleep and stay dry through taper.",
    };

    // ============================================================
    // RENDER
    // ============================================================
    function renderTrend(m) {
      if (m.trend === null) return '';
      if (m.trend === 'neutral' && m.delta === null)
        return '<div class="trend trend--neutral">First month</div>';
      const arrow = m.trend === 'up' ? '\u2191' : m.trend === 'down' ? '\u2193' : '\u2192';
      const cls = m.trend === 'up' ? 'trend--up' : m.trend === 'down' ? 'trend--down' : 'trend--neutral';
      return `<div class="trend ${cls}">${arrow} ${m.delta || ''}</div>`;
    }

    function renderBar(m) {
      if (!m.barPercent) return '';
      return `
        <div class="bar-row">
          <div class="bar-track">
            <div class="bar-fill ${m.barColor}" style="width:${m.barPercent}%"></div>
          </div>
        </div>
      `;
    }

    function renderCard(m, idx) {
      const badge = m.badge ? `<div class="intervention-badge">${m.badge}</div>` : '';
      const sub = m.subvalue ? `<div class="metric-subvalue">${m.subvalue}</div>` : '';
      const extra = m.badge ? ' intervention' : '';
      return `
        <div class="metric-card${extra}">
          <div class="metric-label">${m.label}</div>
          <div class="metric-value">${m.value}</div>
          ${badge}${sub}
          ${renderBar(m)}
          ${renderTrend(m)}
        </div>
      `;
    }

    function render() {
      const d = SCORECARD;
      document.getElementById('hero-month').textContent = d.month;
      document.getElementById('hero-range').textContent = d.dateRange;

      document.getElementById('hero-pills').innerHTML = [
        { v: d.totalDays, l: 'Days' },
        { v: d.totalWorkouts, l: 'Workouts' },
        { v: d.anomalyRows, l: 'Anomalies' }
      ].map(p => `
        <div class="pill">
          <span class="pill-value">${p.v}</span>
          <div class="pill-label">${p.l}</div>
        </div>
      `).join('');

      document.getElementById('metrics-top').innerHTML = d.metrics.slice(0,3).map(renderCard).join('');
      document.getElementById('metrics-bot').innerHTML = d.metrics.slice(3,5).map(renderCard).join('');

      document.getElementById('verdict').innerHTML = `
        <div class="verdict-label">Verdict</div>
        <div class="verdict-text">${d.verdict}</div>
      `;

      document.getElementById('footer-date').textContent = d.dateRange.split(' \u2014 ')[1];
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
